name: Apophenia Pipeline

on:
  schedule:
    # Tue/Fri 00:00 UTC = 07:00 WIB — matches PUBLISH_WEEKDAYS in agents/upload_agent.py
    # (starting point, not locked — adjust once there's watch-time data)
    - cron: "0 0 * * 2,5"
  workflow_dispatch: {}  # manual "Run workflow" button in the Actions tab, for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg + espeak-ng
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Kokoro TTS model files
        id: kokoro-cache
        uses: actions/cache@v4
        with:
          path: kokoro-models
          key: kokoro-models-v1.0

      - name: Download Kokoro TTS model files
        if: steps.kokoro-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p kokoro-models
          curl -L -o kokoro-models/kokoro-v1.0.onnx https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx
          curl -L -o kokoro-models/voices-v1.0.bin https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin

      - name: Restore YouTube credentials
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}" | base64 -d > youtube_client_secret.json
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scheduler.py
